<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ロボセンサー® プリアンプ内蔵型 | ロボセンサー技研株式会社</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1B33;
    --navy-mid: #152844;
    --navy-light: #1E3A5F;
    --accent: #00C98D;
    --accent-dim: rgba(0,201,141,0.15);
    --accent-border: rgba(0,201,141,0.35);
    --white: #FFFFFF;
    --off-white: #F4F6F9;
    --gray-light: #E8ECF2;
    --gray-mid: #8A9AB5;
    --gray-text: #5A6A82;
    --text-primary: #0B1B33;
    --text-secondary: #4A5568;
    --border: rgba(11,27,51,0.1);
    --shadow-sm: 0 2px 12px rgba(11,27,51,0.08);
    --shadow-md: 0 8px 32px rgba(11,27,51,0.12);
    --shadow-lg: 0 20px 60px rgba(11,27,51,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--white);
    color: var(--text-primary);
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(11,27,51,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 0 5%;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .nav-logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px; font-weight: 500;
    color: var(--white);
    letter-spacing: 0.05em;
    display: flex; align-items: center; gap: 10px;
  }
  .nav-logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  .nav-links {
    display: flex; gap: 32px; list-style: none;
  }
  .nav-links a {
    font-size: 13px; color: rgba(255,255,255,0.65);
    text-decoration: none; letter-spacing: 0.03em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-cta {
    font-size: 13px; font-weight: 500;
    color: var(--navy) !important;
    background: var(--accent);
    padding: 8px 20px;
    border-radius: 4px;
    transition: opacity 0.2s !important;
  }
  .nav-cta:hover { opacity: 0.88 !important; color: var(--navy) !important; }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    background: var(--navy);
    display: flex; flex-direction: column; justify-content: center;
    padding: 120px 5% 80px;
    position: relative;
    overflow: hidden;
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,201,141,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,201,141,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .hero-glow {
    position: absolute; top: -200px; right: -100px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,201,141,0.12) 0%, transparent 65%);
    pointer-events: none;
  }
  .hero-content { position: relative; z-index: 1; max-width: 800px; }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 28px;
    padding: 6px 14px;
    border: 1px solid var(--accent-border);
    border-radius: 2px;
    background: var(--accent-dim);
  }
  .hero-h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(36px, 5vw, 62px);
    font-weight: 700;
    line-height: 1.3;
    color: var(--white);
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .hero-h1 em {
    font-style: normal;
    color: var(--accent);
  }
  .hero-sub {
    font-size: clamp(15px, 1.8vw, 18px);
    color: rgba(255,255,255,0.55);
    max-width: 580px;
    line-height: 1.9;
    margin-bottom: 48px;
    font-weight: 300;
  }
  .hero-badges {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-bottom: 48px;
  }
  .hero-badge {
    font-size: 12px; font-weight: 500;
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 2px;
    color: rgba(255,255,255,0.75);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }
  .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn-primary {
    display: inline-block;
    background: var(--accent);
    color: var(--navy);
    font-size: 14px; font-weight: 700;
    padding: 14px 32px;
    border-radius: 4px;
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: opacity 0.2s, transform 0.2s;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-outline {
    display: inline-block;
    background: transparent;
    color: rgba(255,255,255,0.8);
    font-size: 14px; font-weight: 500;
    padding: 14px 32px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.2);
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-outline:hover { border-color: rgba(255,255,255,0.5); color: var(--white); }
  .hero-spec-row {
    position: absolute; bottom: 40px; left: 5%; right: 5%;
    display: flex; gap: 40px;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 28px;
    z-index: 1;
  }
  .spec-item { }
  .spec-val {
    font-family: 'DM Mono', monospace;
    font-size: 22px; font-weight: 500;
    color: var(--white);
    display: block;
  }
  .spec-label {
    font-size: 11px;
    color: var(--gray-mid);
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  /* ── SECTIONS COMMON ── */
  section { padding: 96px 5%; }
  .section-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-eyebrow::before {
    content: '';
    display: block; width: 24px; height: 1px;
    background: var(--accent);
  }
  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(26px, 3.5vw, 40px);
    font-weight: 700;
    line-height: 1.35;
    color: var(--text-primary);
    margin-bottom: 16px;
  }
  .section-lead {
    font-size: 16px;
    color: var(--text-secondary);
    max-width: 560px;
    line-height: 1.85;
    margin-bottom: 56px;
    font-weight: 300;
  }
  .inner { max-width: 1080px; margin: 0 auto; }

  /* ── PROBLEM ── */
  #problem { background: var(--off-white); }
  .problem-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 2px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .problem-card {
    background: var(--white);
    padding: 32px 28px;
  }
  .problem-q {
    font-size: 13px; font-weight: 500;
    color: var(--gray-mid);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .problem-text {
    font-size: 15px; line-height: 1.8;
    color: var(--text-primary);
    font-weight: 400;
  }
  .problem-bar {
    width: 32px; height: 3px;
    background: var(--accent);
    border-radius: 2px;
    margin-top: 20px;
  }

  /* ── FEATURES ── */
  #features { background: var(--white); }
  .feat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
  }
  .feat-card {
    background: var(--off-white);
    border: 1px solid var(--gray-light);
    border-radius: 8px;
    padding: 32px 28px;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  }
  .feat-card:hover {
    border-color: var(--accent-border);
    box-shadow: var(--shadow-md);
    transform: translateY(-3px);
  }
  .feat-card.highlight {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--white);
  }
  .feat-card.highlight:hover { border-color: var(--accent); }
  .feat-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }
  .feat-title {
    font-size: 16px; font-weight: 700;
    color: inherit;
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .feat-desc {
    font-size: 13px; line-height: 1.85;
    color: var(--text-secondary);
    font-weight: 300;
  }
  .feat-card.highlight .feat-desc { color: rgba(255,255,255,0.65); }

  /* ── SHAPE ── */
  #shape { background: var(--navy); }
  #shape .section-title { color: var(--white); }
  #shape .section-lead { color: rgba(255,255,255,0.6); }
  .shape-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .shape-type {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 40px 36px;
    transition: border-color 0.2s;
  }
  .shape-type:hover { border-color: var(--accent-border); }
  .shape-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--accent);
    border: 1px solid var(--accent-border);
    padding: 4px 12px;
    border-radius: 2px;
    letter-spacing: 0.08em;
    margin-bottom: 20px;
  }
  .shape-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px; font-weight: 700;
    color: var(--white);
    margin-bottom: 12px;
  }
  .shape-desc {
    font-size: 14px; line-height: 1.85;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
  }
  .shape-svg-wrap { margin: 24px 0; }

  /* ── USE CASES ── */
  #usecases { background: var(--off-white); }
  .uc-filter {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 36px;
  }
  .uc-tab {
    font-size: 12px; font-weight: 500;
    padding: 7px 18px;
    border-radius: 2px;
    border:
